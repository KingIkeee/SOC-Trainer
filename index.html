<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Path — Exam-Grade Daily Trainer</title>
<style>
  :root{
    --bg:#0a0e14;--panel:#111722;--panel-2:#0d131d;--line:#1e2a3a;
    --ink:#e6edf3;--muted:#7d8da3;--amber:#ffb000;--amber-dim:#7a5500;
    --green:#3fb950;--red:#f85149;--blue:#388bfd;--purple:#a371f7;
    --mono:'SF Mono',ui-monospace,'Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,rgba(255,255,255,0.012) 0 1px,transparent 1px 3px)}
  .wrap{max-width:880px;margin:0 auto;padding:18px 14px 90px;position:relative;z-index:2}

  header{border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .blink{width:8px;height:13px;background:var(--amber);animation:blink 1.1s steps(1) infinite;display:inline-block}
  @keyframes blink{50%{opacity:0}}
  h1{font-family:var(--mono);font-size:23px;font-weight:600;letter-spacing:-.5px;margin:7px 0 2px}
  h1 .arrow{color:var(--amber)}
  .sub{color:var(--muted);font-size:12px;font-family:var(--mono)}

  /* pace toggle */
  .pacebar{display:flex;align-items:center;gap:8px;margin:12px 0 4px;flex-wrap:wrap}
  .pacebar .lbl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px}
  .pace-opts{display:flex;gap:4px;border:1px solid var(--line);border-radius:7px;padding:3px;background:var(--panel-2)}
  .pace-opt{font-family:var(--mono);font-size:10px;padding:5px 10px;border:none;background:transparent;color:var(--muted);border-radius:4px;cursor:pointer;transition:.15s}
  .pace-opt.active{background:var(--amber);color:#0a0e14;font-weight:700}
  .pace-meta{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto}

  .status{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0 16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px 10px;text-align:center}
  .stat .v{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--amber)}
  .stat .l{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.5px;margin-top:2px;text-transform:uppercase}
  .stat.streak .v{color:var(--green)}.stat.tier .v{color:var(--purple)}

  .modes{display:flex;gap:5px;margin-bottom:16px;border:1px solid var(--line);border-radius:8px;padding:4px;background:var(--panel-2)}
  .mode-btn{flex:1;background:transparent;border:none;color:var(--muted);font-family:var(--mono);font-size:11px;padding:8px 4px;border-radius:5px;cursor:pointer;transition:.15s;letter-spacing:.5px}
  .mode-btn:hover{color:var(--ink)}
  .mode-btn.active{background:var(--amber);color:#0a0e14;font-weight:700}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px}

  .banner{border-radius:9px;padding:13px 15px;margin-bottom:14px;font-size:13px;line-height:1.5;display:flex;gap:10px;align-items:flex-start}
  .banner .ic{font-size:16px;flex-shrink:0}
  .banner.warn{background:#1f1405;border:1px solid var(--amber-dim);color:#ffd27a}.banner.warn b{color:var(--amber)}
  .banner.catch{background:#1f0f0f;border:1px solid #4a1d1d;color:#ff9d96}.banner.catch b{color:var(--red)}
  .banner.up{background:#160f24;border:1px solid #3d2a6b;color:#c9b3ff}.banner.up b{color:var(--purple)}
  .banner.ok{background:#0f1f14;border:1px solid #1d4427;color:#8ce29a}.banner.ok b{color:var(--green)}
  .banner.info{background:#0c1420;border:1px solid #1d3a5c;color:#9fc7ff}.banner.info b{color:var(--blue)}

  .weekrail{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
  .daychip{flex:0 0 auto;min-width:62px;border:1px solid var(--line);border-radius:8px;padding:8px 6px;text-align:center;cursor:pointer;background:var(--panel-2);transition:.15s;position:relative}
  .daychip:hover{border-color:var(--amber-dim)}
  .daychip.active{border-color:var(--amber);background:var(--panel)}
  .daychip.done{border-color:#1d4427}
  .daychip.done::after{content:"✓";position:absolute;top:3px;right:5px;color:var(--green);font-size:10px}
  .daychip.missed{border-color:#4a1d1d}
  .daychip.missed::after{content:"!";position:absolute;top:3px;right:6px;color:var(--red);font-size:11px;font-weight:700}
  .daychip.rest{opacity:.55}
  .daychip .dow{font-family:var(--mono);font-size:9px;color:var(--muted)}
  .daychip .dn{font-family:var(--mono);font-size:15px;font-weight:700;margin-top:1px}
  .daychip.rest .dn{color:var(--muted)}
  .daychip .wl{font-family:var(--mono);font-size:8px;color:var(--amber);margin-top:1px}

  .lesson-head{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
  .pill{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:99px;letter-spacing:.5px}
  .pill.cert{background:var(--amber-dim);color:var(--amber)}
  .pill.wk{background:#102036;color:var(--blue)}
  .pill.tierp{background:#1a1033;color:var(--purple)}
  .pill.obj{background:#0d1f15;color:var(--green)}
  .lesson-title{font-size:19px;font-weight:700;margin:6px 0 2px}
  .lesson-focus{color:var(--muted);font-size:13px;margin-bottom:6px}
  .est{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:14px}

  .sec-label{font-family:var(--mono);font-size:11px;color:var(--amber);letter-spacing:1.5px;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
  .sec-label::after{content:"";flex:1;height:1px;background:var(--line)}
  .sec-count{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0}

  .term{border:1px solid var(--line);border-radius:8px;padding:13px 15px;margin-bottom:9px;background:var(--panel-2)}
  .term .t{font-weight:700;font-size:14px;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .term .t .new{font-family:var(--mono);font-size:8px;background:#160f24;color:var(--purple);border:1px solid #3d2a6b;padding:1px 5px;border-radius:4px;letter-spacing:.5px}
  .term .d{font-size:13px;color:var(--muted);line-height:1.6;margin-top:5px}
  .term .eli5{font-size:12.5px;color:#9fb4cc;line-height:1.55;margin-top:7px;border-left:2px solid var(--blue);padding-left:10px}
  .term .eli5 b{color:var(--blue);font-family:var(--mono);font-size:10px;letter-spacing:.5px}
  .term .exam{font-size:11.5px;color:#c9a55a;margin-top:6px;font-family:var(--mono)}

  .task{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line)}
  .task:last-child{border-bottom:none}
  .task .cb{flex-shrink:0;width:20px;height:20px;border:1px solid var(--line);border-radius:5px;cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s}
  .task .cb.checked{background:var(--green);border-color:var(--green)}
  .task .cb.checked::after{content:"✓";color:#0a0e14;font-size:13px;font-weight:700}
  .task .tx{font-size:13.5px;line-height:1.5}
  .task .tx .htag{font-family:var(--mono);font-size:9px;color:var(--blue);border:1px solid #1d3a5c;border-radius:4px;padding:1px 5px;margin-right:6px;letter-spacing:.5px}
  .task.checked .tx{color:var(--muted);text-decoration:line-through}

  .scorebar{display:flex;gap:14px;font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:12px;flex-wrap:wrap}
  .scorebar .ok{color:var(--green)}.scorebar .no{color:var(--red)}
  .quiz-stem{font-size:15px;font-weight:600;margin:4px 0 6px;line-height:1.5}
  .q-obj{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:10px;letter-spacing:.5px}
  .opt{display:block;width:100%;text-align:left;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:11px 14px;margin-bottom:8px;color:var(--ink);cursor:pointer;font-family:var(--sans);font-size:13.5px;transition:.12s}
  .opt:hover{border-color:var(--amber-dim)}
  .opt .ltr{font-family:var(--mono);color:var(--amber);margin-right:9px;font-weight:700}
  .opt.correct{border-color:var(--green);background:#0f1f14}.opt.correct .ltr{color:var(--green)}
  .opt.wrong{border-color:var(--red);background:#1f0f0f}.opt.wrong .ltr{color:var(--red)}
  .opt:disabled{cursor:default}
  .explain{border-left:3px solid var(--amber);background:var(--panel-2);padding:11px 14px;border-radius:0 8px 8px 0;margin-top:12px;font-size:12.5px;line-height:1.6;display:none}
  .explain.show{display:block}.explain b{color:var(--amber)}

  .btn{font-family:var(--mono);font-size:12px;padding:10px 18px;border-radius:7px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);cursor:pointer;transition:.15s;letter-spacing:.5px}
  .btn:hover{border-color:var(--amber-dim)}
  .btn.primary{background:var(--amber);color:#0a0e14;border-color:var(--amber);font-weight:700;width:100%;margin-top:18px;padding:13px}
  .btn.primary:hover{opacity:.9}
  .btn.primary:disabled{background:var(--line);color:var(--muted);border-color:var(--line);cursor:not-allowed;opacity:1}
  .btn.ghost{width:100%;margin-top:10px}

  .vm-lock{text-align:center;padding:30px 16px;color:var(--muted)}
  .vm-lock .lk{font-size:30px;margin-bottom:10px}.vm-lock .mono{font-family:var(--mono);font-size:12px}
  .guide{border:1px solid var(--line);border-radius:9px;margin-bottom:11px;overflow:hidden;background:var(--panel-2)}
  .guide summary{cursor:pointer;padding:14px 15px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:10px;list-style:none}
  .guide summary::-webkit-details-marker{display:none}
  .guide summary .num{font-family:var(--mono);font-size:11px;color:var(--blue);border:1px solid #1d3a5c;border-radius:5px;padding:2px 7px}
  .guide summary .lv{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;margin-left:auto;letter-spacing:.5px}
  .lv.beg{background:#0f1f14;color:var(--green)}.lv.int{background:#1a1605;color:var(--amber)}.lv.adv{background:#1f0f0f;color:var(--red)}
  .guide summary .chev{color:var(--muted);transition:.2s;margin-left:8px}
  .guide[open] summary .chev{transform:rotate(90deg)}
  .gbody{padding:0 16px 16px;font-size:13px;line-height:1.7}
  .gbody .why{color:var(--muted);font-style:italic;margin-bottom:10px}
  .gbody ol{margin:0 0 6px 18px}.gbody ol li{padding:4px 0;color:var(--ink)}
  .gbody code{font-family:var(--mono);font-size:12px;background:#0a0e14;border:1px solid var(--line);border-radius:4px;padding:1px 6px;color:var(--amber)}
  .gbody .tip{border-left:3px solid var(--green);background:#0c1810;padding:9px 12px;border-radius:0 6px 6px 0;margin-top:10px;color:#a7d9b3;font-size:12.5px}
  .gbody .tip b{color:var(--green);font-family:var(--mono);font-size:10px}
  .gbody .warn2{border-left:3px solid var(--amber);background:#1a1405;padding:9px 12px;border-radius:0 6px 6px 0;margin-top:8px;color:#ffd27a;font-size:12.5px}

  .reset{font-family:var(--mono);font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:22px}
  .reset:hover{color:var(--red)}
  .backup-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
  .backup-btn{flex:1;min-width:140px;font-family:var(--mono);font-size:12.5px;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 12px;cursor:pointer;transition:.15s}
  .backup-btn:hover{border-color:var(--amber);color:var(--amber)}
  .backup-btn:active{transform:scale(.98)}
  .backup-hint{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.45}
  .done-screen{text-align:center;padding:26px 10px}
  .done-screen .big{font-size:30px;font-family:var(--mono);color:var(--amber);font-weight:700}
  .done-screen p{color:var(--muted);margin-top:6px;font-size:13px}
  .mini{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;margin-top:14px}
  @media(max-width:560px){.status{grid-template-columns:repeat(2,1fr)}.modes{flex-wrap:wrap}.mode-btn{min-width:30%}.pace-meta{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="blink"></span> soc_path // exam_grade.v3</div>
    <h1>Daily <span class="arrow">→</span> Trainer</h1>
    <div class="sub">A+ → Network+ → Security+ · exam-mapped · beginner-built</div>
    <div class="pacebar">
      <span class="lbl">PACE</span>
      <div class="pace-opts" id="paceOpts">
        <button class="pace-opt" data-pace="faster">FASTER</button>
        <button class="pace-opt" data-pace="balanced">BALANCED</button>
        <button class="pace-opt active" data-pace="thorough">THOROUGH</button>
      </div>
      <span class="pace-meta" id="paceMeta"></span>
    </div>
  </header>

  <div class="status" id="status"></div>

  <div class="modes">
    <button class="mode-btn active" data-mode="today">TODAY</button>
    <button class="mode-btn" data-mode="review">REVIEW</button>
    <button class="mode-btn" data-mode="week">WEEK</button>
    <button class="mode-btn" data-mode="vm">LABS</button>
    <button class="mode-btn" data-mode="export">EXPORT</button>
  </div>

  <div class="panel" id="stage"></div>
  <div class="backup-row">
    <button class="backup-btn" id="exportBackupBtn">⬇ back up progress</button>
    <button class="backup-btn" id="importBackupBtn">⬆ restore progress</button>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none">
  </div>
  <div class="backup-hint" id="backupHint">Saves a small file you can move to another device, then restore there. Your progress lives only in this browser otherwise.</div>
  <button class="reset" id="resetBtn">⟲ reset all progress</button>
</div>

<script>
/* ====================================================================
   EXAM-GRADE CURRICULUM
   term: T(term, technical_def, beginner_eli5, exam_note, tier{1|2})
   quiz: Q(stem, [opts], answerIdx, explain, objective)
   Each day targets ~10 terms + ~9 questions at THOROUGH pace.
   Pace scales how many terms/questions are required (see PACE config).
==================================================================== */
const DOW=["SUN","MON","TUE","WED","THU","FRI","SAT"];
function T(t,d,e,exam,tier){return{t,d,e,exam,t2:tier===2};}
function Q(s,o,a,e,w,obj){return{s,o,a,e,w:w||{},obj};}

const PACE={
  faster:{terms:6,quiz:6,label:"~5-6 mo · heavier compression",estLo:25,estHi:40},
  balanced:{terms:8,quiz:8,label:"~6-7 mo · steady build",estLo:40,estHi:55},
  thorough:{terms:99,quiz:99,label:"~8-9 mo · full depth",estLo:50,estHi:75},
};

const CURRICULUM=[
/* =================================================================
   WEEK 1 — Hardware foundations (220-1201 Domain 3)
   (rebuilt with wrongWhy on every question)
================================================================= */
{cert:"A+",week:1,day:1,title:"The core components",focus:"What every computer is made of and how the pieces cooperate.",obj:"1201 · 3.4–3.5 System components",
 terms:[
  T("CPU (Central Processing Unit)","The processor chip that fetches, decodes, and executes instructions. Measured in GHz and cores/threads.","The brain doing the actual thinking. More cores = it can think about more things at once.","GHz = speed, cores = parallelism. Intel/AMD make them.",1),
  T("RAM (Random Access Memory)","Volatile high-speed memory holding data the CPU is actively using. Cleared on power loss.","Your desk surface — whatever you're working on sits there. Power off and the desk is wiped.","Volatile = loses data without power. Not the same as storage.",1),
  T("Storage (HDD vs SSD)","Non-volatile storage that survives power-off. HDD = spinning platters (cheap, slower). SSD = flash (fast, durable).","The filing cabinet — files stay even after you leave. SSD fast, HDD slow.","HDD has moving parts; SSD is faster and shock-resistant.",1),
  T("Motherboard","The main board connecting CPU, RAM, storage, and expansion cards via buses and slots.","The city road network linking every building so they can talk.","Form factors: ATX > microATX > Mini-ITX by size.",1),
  T("Power Supply Unit (PSU)","Converts wall AC into regulated DC voltages (+3.3V/+5V/+12V). Rated in watts.","The translator between the wall socket's electricity and the language your parts speak.","Wattage must exceed total draw. 80+ = efficiency rating.",1),
  T("GPU (Graphics Processing Unit)","Processor specialized for rendering graphics. Integrated (shares RAM) or dedicated (own VRAM).","A second brain just for drawing the screen, so the main brain isn't overloaded.","Integrated shares system RAM; dedicated has its own VRAM.",1),
  T("PCIe slot","Expansion sockets on the motherboard. x16 = GPUs, x1 = smaller cards.","Empty sockets inside the PC where you bolt on extra abilities.","x16 = GPU slot, x1 = smaller cards.",1),
  T("Cooling (heatsink + fan + thermal paste)","Moves heat off the CPU/GPU. Thermal paste bridges chip to heatsink; without it heat can't transfer.","The AC for hot chips. Paste is the required contact layer — skip it and the chip cooks.","Thermal paste is mandatory between CPU and heatsink.",1),
  T("BIOS/UEFI firmware","Low-level firmware that initializes hardware at boot, then hands to the OS. UEFI is modern.","The opening manager who flips the lights on before staff (the OS) arrive.","UEFI = GPT/large disks/Secure Boot. Legacy BIOS = MBR.",1),
  T("Data path: Storage → RAM → CPU ◆CONNECTOR","Opening a program: it's read from STORAGE, loaded into RAM, then processed by the CPU from RAM. Saving writes RAM back to storage.","Files live in the cabinet (storage), laid on your desk (RAM), worked on by your brain (CPU). Save = file it back.","Connects the parts. Load-order and 'where did unsaved work go' come from here.",1),
 ],
 tasks:[
  "<span class='htag'>RECALL</span> Name every component and one sentence on each, no peeking.",
  "<span class='htag'>VISUAL</span> Search 'labeled ATX motherboard' and point to CPU socket, RAM slots, PCIe x16, 24-pin power.",
  "<span class='htag'>WRITE</span> Explain the Storage→RAM→CPU data path in your own words.",
  "<span class='htag'>CONNECT</span> Which 3 upgrades make an old PC feel fastest, and why?",
 ],
 quiz:[
  Q("You open a large file: it loads from the drive into memory, then the processor edits it. Correct data-flow order?",
   ["CPU → RAM → Storage","Storage → RAM → CPU","RAM → Storage → CPU","CPU → Storage → RAM"],1,
   "The data path connector: data lives in storage, loads into RAM, and the CPU works on it from RAM.",
   {0:"This reverses the flow. The CPU is the last stage, not the first — it can't process data that hasn't been loaded into RAM yet.",
    2:"RAM doesn't pull from storage on its own; storage is the starting point. RAM is the middle stage, not the source.",
    3:"The CPU never reads bulk data straight from storage in normal operation — data must pass through RAM first for speed."},
   "3.4 components"),
  Q("A technician installs a CPU but skips thermal paste. Most likely result?",
   ["The PC won't power on at all","The CPU overheats and throttles or shuts down","RAM is not detected","The GPU fails"],1,
   "Thermal paste is the required heat bridge to the heatsink. Without it heat can't transfer, so the chip overheats.",
   {0:"It will power on fine — the problem appears under load as heat builds, not at the power stage.",
    2:"Thermal paste has nothing to do with RAM detection; that's a memory seating or slot issue.",
    3:"The GPU is a separate component with its own cooling; missing CPU paste doesn't affect it."},
   "3.4 cooling"),
  Q("Which component converts wall AC into the DC voltages the system uses?",
   ["Chipset","PSU","CPU","GPU"],1,
   "The PSU converts AC to the +3.3V/+5V/+12V DC rails components require.",
   {0:"The chipset routes data between components; it doesn't handle power conversion.",
    2:"The CPU consumes power and processes instructions — it doesn't convert AC to DC.",
    3:"The GPU renders graphics and draws power; it doesn't supply or convert it."},
   "3.5 power"),
  Q("What distinguishes a dedicated GPU from an integrated GPU?",
   ["Dedicated uses system RAM","Integrated has its own VRAM","Dedicated has its own dedicated video memory (VRAM)","They are identical"],2,
   "A dedicated GPU ships with its own VRAM; an integrated GPU shares the system's main RAM.",
   {0:"That's backwards — sharing system RAM is the integrated GPU's trait, not the dedicated one's.",
    1:"Also reversed: integrated GPUs borrow system RAM precisely because they lack their own VRAM.",
    3:"They differ significantly in performance and memory; integrated trades power for lower cost/heat."},
   "3.4 GPU"),
  Q("Unsaved work is lost during a power outage. Which property of RAM explains this?",
   ["It's encrypted","It's volatile","It's magnetic","It's read-only"],1,
   "RAM is volatile — it needs power to retain data, so a power loss wipes anything not saved to storage.",
   {0:"Encryption protects data confidentiality; it has nothing to do with data vanishing on power loss.",
    2:"RAM is not magnetic (that describes HDD platters). Magnetic storage actually retains data without power.",
    3:"RAM is read AND write; 'read-only' would describe certain firmware, and wouldn't explain data loss."},
   "3.4 memory"),
  Q("Which slot type installs a high-end graphics card?",
   ["PCIe x1","PCIe x16","SATA","RAM DIMM"],1,
   "PCIe x16 provides the bandwidth a GPU needs. x1 is for smaller expansion cards.",
   {0:"x1 has far too little bandwidth for a GPU; it's for small cards like a NIC or sound card.",
    2:"SATA is a storage interface for drives, not an expansion slot for graphics cards.",
    3:"A DIMM slot is for RAM modules only — a GPU physically won't fit and wouldn't function there."},
   "3.4 expansion"),
 ],
 notes:[
  "Motherboard form factors by size: ATX (largest) > microATX > Mini-ITX (smallest).",
  "PSU wattage must exceed total component draw combined; 80+ ratings indicate efficiency tiers.",
  "UEFI supports GPT, large disks, and Secure Boot; legacy BIOS is limited to MBR partitioning.",
 ]},

{cert:"A+",week:1,day:2,title:"CPU & memory deep dive",focus:"How processors and RAM actually work.",obj:"1201 · 3.4 CPU, 3.2 memory",
 terms:[
  T("Core","A complete physical processing unit inside the CPU. Quad-core = 4 in parallel.","Each core is a worker. Four cores = four workers side by side.","More cores help multitasking and multithreaded apps.",1),
  T("Thread","A single instruction stream. SMT/Hyper-Threading lets one core run two threads.","A thread is one task line a worker handles.","'4 cores / 8 threads' = SMT doubling logical processors.",1),
  T("Hyper-Threading / SMT ◆CONNECTOR","Makes one physical core present as two logical threads — why a chip reads '4 cores / 8 threads'.","The trick letting each worker juggle two task lines.","Directly answers the '4 cores / 8 threads' question.",1),
  T("Clock speed (GHz)","Cycles per second in billions. 3.5 GHz ≈ 3.5 billion cycles/sec.","How fast each worker moves.","Don't blindly compare GHz across architectures.",1),
  T("Cache (L1/L2/L3)","Tiny ultra-fast memory in the CPU. L1 smallest/fastest, L3 largest/slower. Cuts RAM trips.","A sticky note on the worker's hand vs walking to the desk (RAM).","L1<L2<L3 in speed; L3 largest.",1),
  T("32-bit (x86) vs 64-bit (x64) ◆CONNECTOR","x86 addresses ~4GB RAM max; x64 addresses far more. A 32-bit OS on 8GB only 'sees' ~4GB — fix is a 64-bit OS.","x86 is a small mailbox; x64 is huge. Small mailbox = wasted RAM.","Answers the '8GB but only 4GB usable' question.",1),
  T("DDR4 / DDR5","RAM generations. Different notch/voltage — not interchangeable.","Fuel grades that don't fit the same nozzle.","Match RAM gen to motherboard support.",1),
  T("DIMM vs SO-DIMM","DIMM = desktop stick; SO-DIMM = compact laptop stick.","Travel-size RAM for tight laptop space.","Not interchangeable; identify by size.",1),
  T("Dual-channel memory","Matched RAM pairs in matching slots widen the path and boost bandwidth.","Two checkout lanes open instead of one.","Populate matching-colored slots in pairs.",1),
  T("ECC RAM","Error-Correcting Code memory; detects/fixes bit errors. Servers.","RAM with a built-in proofreader.","Servers use ECC; many consumer boards don't.",1),
 ],
 tasks:[
  "<span class='htag'>RECALL</span> Explain core vs thread and what '6 cores / 12 threads' means.",
  "<span class='htag'>VISUAL</span> Search 'DDR4 vs DDR5 SO-DIMM'; note the notch difference.",
  "<span class='htag'>APPLY</span> Friend has 32-bit OS + 8GB but ~4GB usable. Write the fix and why.",
  "<span class='htag'>LAB-PREP</span> Task Manager → Performance → CPU. Note cores, logical processors, speed.",
 ],
 quiz:[
  Q("A CPU is listed '4 cores, 8 threads'. What produces the 8 threads?",
   ["Overclocking","Hyper-Threading / SMT","Dual-channel RAM","More cache"],1,
   "SMT/Hyper-Threading doubles 4 physical cores into 8 logical threads.",
   {0:"Overclocking raises clock speed, not thread count. It makes existing cores faster, not more numerous.",
    2:"Dual-channel is a RAM bandwidth feature; it has nothing to do with how many CPU threads exist.",
    3:"Cache speeds up data access but doesn't create additional logical threads."},
   "3.4 CPU"),
  Q("A laptop needs more RAM. Which form factor?",
   ["Full-size DIMM","SO-DIMM","ECC DIMM","PCIe"],1,
   "Laptops use the compact SO-DIMM; full-size DIMMs won't fit.",
   {0:"A full-size DIMM is physically too large for a laptop's memory slots.",
    2:"ECC is a server feature and still in full-DIMM form; a standard laptop won't take it.",
    3:"PCIe is an expansion-card interface, not a RAM form factor at all."},
   "3.2 memory"),
  Q("8GB installed but only ~4GB usable. Most likely cause?",
   ["Faulty PSU","A 32-bit (x86) OS","DDR5 in a DDR4 slot","Single-channel mode"],1,
   "A 32-bit OS caps addressable memory near 4GB regardless of installed amount. Install a 64-bit OS.",
   {0:"A failing PSU causes shutdowns or no-boot, not a clean 4GB memory ceiling.",
    2:"Incompatible DDR generations physically won't seat, so the system wouldn't post — not run at half RAM.",
    3:"Single-channel reduces bandwidth, not the total amount of addressable RAM."},
   "3.2 memory limits"),
  Q("Why install RAM in matched pairs in the correctly colored slots?",
   ["To enable ECC","To enable dual-channel bandwidth","To allow 32-bit addressing","To cool the CPU"],1,
   "Matched pairs in the right slots enable dual-channel, widening the memory path.",
   {0:"ECC is a property of the RAM modules themselves, not of how you pair them in slots.",
    2:"Addressing width is set by the CPU/OS architecture, not by slot pairing.",
    3:"RAM placement doesn't cool the CPU; that's the heatsink/fan's job."},
   "3.2 channels"),
  Q("Which memory type detects and corrects errors and is common in servers?",
   ["DDR4","SO-DIMM","ECC RAM","Cache"],2,
   "ECC RAM catches and fixes bit errors, valued in servers for reliability.",
   {0:"DDR4 is a generation/speed spec, not an error-correction feature — DDR4 can be non-ECC.",
    1:"SO-DIMM describes physical size (laptops), not error correction.",
    3:"Cache is fast CPU memory; it isn't the server error-correcting memory being described."},
   "3.2 ECC"),
  Q("Which CPU cache level is the fastest and smallest?",
   ["L3","L2","L1","DDR5"],2,
   "L1 is the smallest and fastest, sitting closest to the core.",
   {0:"L3 is the largest and slowest of the cache levels, the opposite of what's asked.",
    1:"L2 sits between L1 and L3 — neither the fastest nor the smallest.",
    3:"DDR5 is main system RAM, far slower than any on-die CPU cache."},
   "3.4 cache"),
 ],
 notes:[
  "32-bit apps run on a 64-bit OS, but 64-bit apps will NOT run on a 32-bit OS.",
  "DDR generations are notched differently on purpose to prevent incompatible installs.",
  "Modern CPUs put the memory controller on-die, lowering latency vs the old northbridge design.",
 ]},

{cert:"A+",week:1,day:3,title:"Storage technologies & RAID",focus:"Drive types, interfaces, and redundancy.",obj:"1201 · 3.3 storage & RAID",
 terms:[
  T("HDD (Hard Disk Drive)","Magnetic spinning platters + head. Cheap, mechanical, slower. 5400/7200 RPM.","A record player for data.","RPM affects speed; mechanical = drop-sensitive.",1),
  T("SSD (Solid State Drive)","Flash storage, no moving parts. Faster, durable, pricier per GB.","A cabinet where data is just instantly there.","No moving parts = shock-resistant, silent.",1),
  T("SATA","Drive interface. SATA III ~6 Gbps (~600 MB/s) — fine for HDD, a bottleneck for fast SSDs.","A standard road; jams the fastest cars.","SATA III ≈ 600 MB/s ceiling.",1),
  T("NVMe / M.2 ◆CONNECTOR","NVMe = protocol over PCIe lanes; M.2 = slot shape. Far faster than SATA. But some M.2 are SATA-speed, so M.2 isn't automatically fast.","A teleporter — but some teleporter-shaped drives are secretly roads.","M.2 = shape; NVMe = speed. Not all M.2 are NVMe.",1),
  T("RAID 0 (striping)","Splits data across 2+ drives for speed. No redundancy. Min 2.","Two movers carry half each — fast, but drop one and it's ruined.","Min 2. Performance only.",1),
  T("RAID 1 (mirroring)","Identical copies on 2 drives. Survives one failure. 50% capacity. Min 2.","A live photocopy.","Min 2. Redundancy, 50% capacity cost.",1),
  T("RAID 5 (striping + parity)","Stripes data + parity across 3+ drives. One drive can fail and rebuild. Min 3.","Everyone remembers a bit about everyone — lose one, rebuild it.","Min 3. Survives 1 failure, efficient.",1),
  T("RAID 10 (1+0)","Mirrored pairs, then striped. Speed AND redundancy. Min 4.","Photocopy each load AND split among fast movers.","Min 4. Best of both, higher cost.",1),
  T("Parity ◆CONNECTOR","Calculated redundancy that rebuilds a failed drive. RAID 5/6 use it; RAID 0/1 do not.","A checksum that reverse-engineers the dead drive.","RAID 5/6 use parity; 0/1 don't.",1),
  T("RAID is not a backup ◆CONNECTOR","RAID survives hardware failure, but deletions/ransomware replicate across the array. Backups still required.","Shred a file and the photocopier shreds the copy too.","Common exam 'gotcha' — RAID ≠ backup.",1),
 ],
 tasks:[
  "<span class='htag'>RECALL</span> Table from memory: RAID 0/1/5/10 → min drives, redundancy, capacity.",
  "<span class='htag'>APPLY</span> 4 drives, want speed AND survive a failure. Which RAID and why?",
  "<span class='htag'>VISUAL</span> Search 'M.2 NVMe vs SATA SSD'; note some M.2 are SATA-speed.",
  "<span class='htag'>WRITE</span> Explain why RAID is not a backup to a beginner.",
 ],
 quiz:[
  Q("Maximum drive speed, NO redundancy needed. Which RAID?",
   ["RAID 1","RAID 0","RAID 5","RAID 10"],1,
   "RAID 0 stripes for pure speed with no redundancy — exactly when fault tolerance isn't needed.",
   {0:"RAID 1 mirrors for redundancy at the cost of half your capacity — not a pure-speed play.",
    2:"RAID 5 adds parity overhead for redundancy; that's not the fastest option.",
    3:"RAID 10 delivers redundancy plus speed but needs 4 drives — overkill when redundancy isn't wanted."},
   "3.3 RAID"),
  Q("3 drives, must survive one failure with good capacity. Best choice?",
   ["RAID 0","RAID 1","RAID 5","RAID 10"],2,
   "RAID 5 needs minimum 3 drives, survives one failure via parity, and uses capacity efficiently.",
   {0:"RAID 0 has zero redundancy — one drive failure loses everything.",
    1:"RAID 1 works but only uses 2 drives and wastes 50% capacity; RAID 5 uses all 3 more efficiently.",
    3:"RAID 10 needs a minimum of 4 drives, so it can't run on 3."},
   "3.3 RAID"),
  Q("Which is true of RAID 1?",
   ["It needs 3 drives","50% usable capacity, survives one failure","It has no redundancy","Big write-speed boost"],1,
   "RAID 1 mirrors across 2 drives — half usable, survives one failure.",
   {0:"RAID 1 needs only 2 drives; 3 is the minimum for RAID 5.",
    2:"Mirroring IS redundancy — that's the whole point of RAID 1.",
    3:"RAID 1 doesn't boost write speed; it writes the same data twice."},
   "3.3 RAID"),
  Q("A fast NVMe SSD performs no better than a SATA SSD. Most likely reason?",
   ["The M.2 slot is wired for SATA, not PCIe/NVMe","The CPU is too slow","RAID 0 is enabled","The PSU is underpowered"],0,
   "Some M.2 slots/drives run only at SATA speed. If the slot or drive is SATA-keyed, you won't get NVMe speeds.",
   {1:"A modern CPU isn't the bottleneck for drive throughput; the interface is.",
    2:"RAID 0 would increase speed, not cap it at SATA levels.",
    3:"An underpowered PSU causes instability/shutdowns, not a precise SATA-speed ceiling."},
   "3.3 interfaces"),
  Q("RAID 10 requires a minimum of how many drives?",
   ["2","3","4","6"],2,
   "RAID 10 (mirrored pairs, then striped) needs at least 4 drives.",
   {0:"2 drives is the minimum for RAID 0 or RAID 1, not RAID 10.",
    1:"3 drives is RAID 5's minimum; RAID 10 needs an even number of at least 4.",
    3:"6 works but isn't the minimum — 4 is."},
   "3.3 RAID"),
  Q("Why is RAID NOT a substitute for backups?",
   ["RAID is too slow","Deletions, corruption, and ransomware replicate across the array","RAID can't survive failures","RAID encrypts data"],1,
   "RAID protects against hardware failure, but a deletion or ransomware encryption is mirrored instantly.",
   {0:"Speed isn't the issue; many RAID levels are fast. The issue is logical data loss.",
    2:"RAID specifically DOES survive hardware failures — that's its purpose; it just doesn't replace backups.",
    3:"RAID doesn't encrypt data; encryption is a separate control."},
   "3.3 concepts"),
 ],
 notes:[
  "SATA III's ~600 MB/s ceiling is why NVMe over PCIe exists — NVMe can be several times faster.",
  "Hot-swappable drives can be replaced while powered on, common in RAID servers for zero downtime.",
  "Memorize RAID minimums: 0→2, 1→2, 5→3, 10→4.",
 ]},

{cert:"A+",week:1,day:4,title:"Boot process & POST troubleshooting",focus:"Power button to OS, and diagnosing failures.",obj:"1201 · 3.4 boot + 5.x troubleshooting",
 terms:[
  T("POST (Power-On Self-Test)","Firmware check of CPU/RAM/GPU at startup before the bootloader. Failures = beeps/LEDs.","A roll-call before the workday.","Runs before video; beep/LED codes report pre-video faults.",1),
  T("Beep codes","Beep patterns emitted when POST fails before video works. Each maps to a fault.","Morse code from a PC that can't show a screen yet.","Look up by motherboard/BIOS vendor.",1),
  T("Diagnostic LEDs / POST card","Onboard LEDs (CPU/DRAM/VGA/BOOT) or a card showing where POST stalls.","A dashboard light naming the failed part.","Useful when there's no speaker for beeps.",1),
  T("Bootloader","Loads the OS into RAM after POST passes. Corruption = 'no bootable device'.","The usher walking the OS to the desk.","Corrupt bootloader → boot errors.",1),
  T("Boot order","Firmware setting for which device to boot first. Wrong order = 'no OS found'.","The list of which drawer to open first.","Misconfig → no-OS or unexpected USB boot.",1),
  T("CMOS battery ◆CONNECTOR","Coin battery for the chip storing firmware settings + real-time clock. Dead = clock + BIOS settings reset every boot.","A notepad with its own battery; dies and forgets time/settings each shutdown.","That exact symptom = dead CMOS battery.",1),
  T("Secure Boot","UEFI feature allowing only signed bootloaders, blocking boot-level malware.","A bouncer only admitting verified OS loaders.","May need disabling for some Linux/older media.",1),
  T("No POST vs No Boot ◆CONNECTOR","No POST = fails before firmware finishes → core hardware. No boot = POST passes, OS won't load → drive/bootloader/boot order.","Two failure neighborhoods: before the OS vs starting the OS.","Tells you where to look first.",1),
  T("Thermal shutdown ◆CONNECTOR","Fine at idle, dies under load = overheating (failing fan, dust, dried paste) since heat spikes under load.","Runs walking, collapses sprinting.","Load-triggered shutdown = thermal.",1),
  T("CompTIA 6-step troubleshooting ◆CONNECTOR","1 Identify · 2 Theory · 3 Test theory · 4 Plan · 5 Implement & verify · 6 Document. Documentation is ALWAYS last.","A recipe so you fix the real cause, then write it down.","Memorize the order verbatim.",1),
 ],
 tasks:[
  "<span class='htag'>RECALL</span> Write the 6-step methodology in order from memory.",
  "<span class='htag'>APPLY</span> No display, repeating beeps — walk steps 1–3 aloud.",
  "<span class='htag'>SCENARIO</span> Clock resets + BIOS settings vanish each boot — name the part.",
  "<span class='htag'>LAB-PREP</span> Enter firmware setup, find the Boot Order screen (don't change it).",
 ],
 quiz:[
  Q("PC powers on, fans spin, no display, repeating beeps. Best first action?",
   ["Reinstall the OS","Match the beep pattern to the motherboard/BIOS manual","Replace the hard drive","Replace the PSU immediately"],1,
   "Beep codes are POST reporting a fault before video works. Map the pattern first — usually RAM or GPU.",
   {0:"No display means you can't even reach the OS — reinstalling it is impossible and irrelevant here.",
    2:"A drive fault wouldn't stop POST or cause beep codes; the system would post then fail to find an OS.",
    3:"Swapping the PSU is an expensive guess; the beep code points to the actual fault first."},
   "5.2 troubleshooting"),
  Q("What is the LAST step of the troubleshooting methodology?",
   ["Test the theory","Verify full functionality","Document findings, actions, and outcomes","Establish a plan"],2,
   "Documentation is always the final step so the fix is repeatable and traceable.",
   {0:"Testing the theory is step 3, in the middle of the process.",
    1:"Verifying functionality is second-to-last — important, but documentation comes after it.",
    3:"Establishing a plan is step 4, well before the end."},
   "5.1 methodology"),
  Q("Clock resets and BIOS settings vanish every boot. Most likely cause?",
   ["Failed SSD","Dead CMOS battery","Corrupt OS","Bad RAM"],1,
   "The CMOS battery maintains firmware settings and the real-time clock; when it dies both reset each boot.",
   {0:"A failed SSD causes boot/data problems, not a resetting clock and lost BIOS settings.",
    2:"A corrupt OS produces boot errors after POST, not firmware-level clock/setting loss.",
    3:"Bad RAM causes crashes or no-POST, not specifically a resetting CMOS clock."},
   "5.2 symptoms"),
  Q("'No bootable device' but POST completes normally. Points to a problem with…?",
   ["The CPU","The RAM","The drive/bootloader or boot order","The GPU"],2,
   "POST passing rules out core hardware; a no-boot afterward points to drive, bootloader, or boot order.",
   {0:"If the CPU were the issue, POST itself would fail — but it completed.",
    1:"Bad RAM typically blocks POST; here POST passed, so RAM isn't the suspect.",
    3:"A GPU fault shows as no display, not a 'no bootable device' message after a clean POST."},
   "5.2 boot issues"),
  Q("Which step comes immediately AFTER 'Establish a theory of probable cause'?",
   ["Document","Identify the problem","Test the theory to determine cause","Implement the solution"],2,
   "Order: Identify → Theory → Test the theory → Plan → Implement/verify → Document.",
   {0:"Documenting is the final step, not right after forming a theory.",
    1:"Identifying the problem is step 1, before you form any theory.",
    3:"You implement only after testing the theory and forming a plan — not immediately after theorizing."},
   "5.1 methodology"),
  Q("PC runs fine at idle but shuts down under heavy gaming. Most likely cause?",
   ["Dead CMOS battery","Overheating / inadequate cooling","Wrong boot order","Secure Boot enabled"],1,
   "Load-triggered shutdowns indicate overheating — failing fan, dust, or dried thermal paste.",
   {0:"A dead CMOS battery resets settings/clock; it doesn't cause load-dependent shutdowns.",
    2:"Boot order only affects startup device selection, not mid-game stability.",
    3:"Secure Boot governs which OS loaders are allowed; it has no effect on thermal behavior."},
   "5.2 thermal"),
 ],
 notes:[
  "Secure Boot sometimes must be disabled to boot certain Linux distros or older install media.",
  "Diagnostic LEDs are essential on boards lacking an internal speaker for beep codes.",
  "The 6-step methodology is one of the most reliably tested items on the A+ exam — know it cold.",
 ]},

{cert:"A+",week:1,day:5,title:"Week 1 checkpoint & integration",focus:"Prove the week stuck. 85%+ unlocks Tier-2 hardware vocab.",obj:"1201 · Domain 3 cumulative",
 terms:[
  T("Thermal throttling","A chip cuts clock speed near its thermal limit to avoid damage.","Sprinting then easing off because you're overheating.","Explains 'slows under load'.",1),
  T("TDP (Thermal Design Power)","Heat output (watts) a cooler must dissipate for a CPU. Guides cooler/PSU sizing.","How much heat the part throws off.","Higher TDP needs beefier cooling.",1),
  T("Field-Replaceable Unit (FRU)","A part swapped on-site (RAM, drive, PSU, fan) vs sending the whole unit out.","Parts you fix in the field.","Speeds real-world repair decisions.",1),
 ],
 tasks:[
  "<span class='htag'>RECALL</span> From memory: data flow, RAID 0/1/5/10 specs, 6-step methodology.",
  "<span class='htag'>INTEGRATE</span> Diagnose: slows then shuts off during gaming — name subsystem + concept.",
  "<span class='htag'>SELF-TEST</span> Re-explain core vs thread and why RAID isn't a backup.",
 ],
 quiz:[
  Q("Data flow when opening a file is…",["CPU→RAM→Storage","Storage→RAM→CPU","RAM→CPU→Storage","Storage→CPU→RAM"],1,
   "Storage → RAM → CPU.",{0:"Reversed — CPU is last.",2:"RAM isn't the source; storage is.",3:"CPU doesn't read bulk data straight from storage."},"3.4"),
  Q("Survives one failure with exactly 2 drives is…",["RAID 0","RAID 1","RAID 5","RAID 10"],1,
   "RAID 1 mirrors across 2 drives.",{0:"RAID 0 has no redundancy.",2:"RAID 5 needs 3 drives.",3:"RAID 10 needs 4 drives."},"3.3"),
  Q("The final troubleshooting step is…",["Test theory","Verify","Document","Plan"],2,
   "Document is always last.",{0:"Testing is step 3.",1:"Verify is second-to-last.",3:"Plan is step 4."},"5.1"),
  Q("Clock resets every boot →",["Bad RAM","Dead CMOS battery","Bad PSU","Corrupt OS"],1,
   "CMOS battery.",{0:"Bad RAM = crashes/no-POST.",2:"Bad PSU = shutdowns.",3:"Corrupt OS = post-POST boot errors."},"5.2"),
  Q("A 32-bit OS caps RAM near…",["1GB","4GB","16GB","64GB"],1,
   "~4GB for x86.",{0:"Too low; the cap is ~4GB.",2:"That requires 64-bit.",3:"That requires 64-bit."},"3.2"),
  Q("Repeating beeps, no video → first step:",["Reinstall OS","Check beep codes vs manual","Swap PSU","Replace drive"],1,
   "Map beep codes first.",{0:"Can't reach the OS with no display.",2:"Expensive guess before diagnosis.",3:"A drive fault wouldn't beep at POST."},"5.2"),
  Q("RAID 5 minimum drives:",["2","3","4","5"],1,
   "Minimum 3.",{0:"That's RAID 0/1.",2:"That's RAID 10.",3:"More than the minimum."},"3.3"),
  Q("A chip slowing under heat is…",["Overclocking","Thermal throttling","Parity","POST"],1,
   "Thermal throttling.",{0:"Overclocking speeds up, not down.",2:"Parity is a RAID concept.",3:"POST is a boot check."},"3.4"),
  Q("Fastest SSD protocol over PCIe lanes:",["SATA","NVMe","HDD","ECC"],1,
   "NVMe.",{0:"SATA is the slower interface.",2:"HDD is a mechanical drive type.",3:"ECC is error-correcting RAM."},"3.3"),
  Q("Laptop RAM form factor:",["DIMM","SO-DIMM","NVMe","ATX"],1,
   "SO-DIMM.",{0:"DIMM is desktop-size.",2:"NVMe is storage.",3:"ATX is a motherboard form factor."},"3.2"),
 ],
 notes:[
  "This checkpoint mixes every connector concept — data path, RAID logic, troubleshooting order, symptom-to-cause.",
  "85%+ unlocks Tier-2 hardware vocabulary (overclocking/XMP, PCIe gens, liquid cooling, bifurcation).",
 ]},
/* ===== WEEK 2 — Operating Systems ===== */
{cert:"A+",week:2,day:1,title:"What an OS does",focus:"The layer between you and the hardware.",obj:"1202 · 1.1 OS basics",
 terms:[
  T("Operating System","Software managing hardware and running programs (Windows, macOS, Linux).","The manager taking your requests and telling the hardware what to do.","Know Windows/macOS/Linux/ChromeOS.",1),
  T("Kernel","The OS core directly controlling CPU, memory, and devices.","The manager's inner circle that touches the machinery.","Everything routes through the kernel.",1),
  T("x86 vs x64 (OS) ◆CONNECTOR","32-bit OS caps ~4GB RAM; 64-bit addresses far more. 64-bit runs 32-bit apps, not vice versa.","Small mailbox vs giant mailbox for RAM.","Explains RAM caps and app compatibility.",1),
  T("File system (NTFS/FAT32/exFAT) ◆CONNECTOR","NTFS = Windows default w/ permissions + large files. FAT32 = old, 4GB file limit. exFAT = flash drives, no 4GB limit.","The cabinet's filing rulebook; NTFS is the modern Windows one.","NTFS=permissions; FAT32=4GB cap; exFAT=big files on USB.",1),
  T("GUI vs CLI","Graphical (clicking) vs command-line (typing) interfaces.","Pointing at buttons vs typing orders.","CLI is faster/scriptable for techs.",1),
  T("Windows editions","Home, Pro, Enterprise. Pro adds BitLocker, domain join, Group Policy, RDP host.","Trim levels of Windows; Pro has the work features.","Pro vs Home is tested.",1),
  T("Driver","Software letting the OS talk to specific hardware.","A translator hired for one device.","Wrong/missing driver = device won't work.",1),
  T("Workgroup vs Domain","Workgroup = peer-to-peer, local accounts. Domain = centralized, server-managed.","A potluck vs a company with central HR.","Domain join is a Pro feature.",1),
  T("System requirements","Minimum CPU/RAM/storage/TPM an OS needs (Win11 = TPM 2.0 + 64-bit).","The bouncer's checklist to install.","Win11: TPM 2.0, Secure Boot, 64-bit.",1),
  T("32/64-bit app compatibility ◆CONNECTOR","64-bit OS runs both 32- and 64-bit apps; 32-bit OS runs only 32-bit apps.","A big garage fits big and small cars; a small one only small.","Pairs with x86/x64 connector.",1),
 ],
 tasks:[
  "<span class='htag'>RECALL</span> Define kernel; what sits between you and hardware?",
  "<span class='htag'>APPLY</span> Why can't a 32-bit OS use 16GB RAM? Write the fix.",
  "<span class='htag'>COMPARE</span> NTFS vs FAT32 vs exFAT — when to use each.",
  "<span class='htag'>LAB-PREP</span> Settings → System → About: note your edition (Home/Pro).",
 ],
 quiz:[
  Q("A PC has 16GB RAM but only 'sees' ~4GB. Likely cause?",["Bad SSD","A 32-bit (x86) OS","Wrong file system","RAID 0"],1,
   "A 32-bit OS caps addressable RAM near 4GB. Install a 64-bit OS to use 16GB.",
   {0:"A bad SSD affects storage/boot, not RAM addressing.",2:"The file system organizes files; it doesn't limit RAM.",3:"RAID is storage config, unrelated to usable RAM."},"1.1 OS"),
  Q("Modern Windows default file system with permissions?",["FAT32","exFAT","NTFS","ext4"],2,
   "NTFS is the Windows default, supporting permissions and large volumes.",
   {0:"FAT32 is old, no permissions, 4GB file cap.",1:"exFAT is for flash drives; lacks NTFS's permission model.",3:"ext4 is Linux, not the Windows default."},"1.3 file systems"),
  Q("Copy a single 8GB file to USB without size errors. Which file system?",["FAT32","exFAT","Either","Neither"],1,
   "exFAT (or NTFS) handles files over 4GB; FAT32 caps per-file at 4GB.",
   {0:"FAT32's 4GB per-file limit blocks an 8GB file.",2:"FAT32 specifically fails, so 'either' is wrong.",3:"exFAT works, so 'neither' is wrong."},"1.3 file systems"),
  Q("Which edition supports BitLocker, domain join, and Group Policy?",["Home","Pro","Starter","Basic"],1,
   "Windows Pro adds BitLocker, domain join, Group Policy, and RDP hosting.",
   {0:"Home lacks all three.",2:"Starter is a legacy stripped edition.",3:"'Basic' isn't a current edition with these features."},"1.1 editions"),
  Q("A 64-bit app won't install on a 32-bit OS because…",["Low storage","A 32-bit OS can't run 64-bit apps","Missing driver","NTFS required"],1,
   "32-bit operating systems cannot run 64-bit applications; the reverse works.",
   {0:"Storage isn't the barrier — it's architecture.",2:"A driver issue affects hardware, not app bitness.",3:"File system doesn't determine 32/64-bit compatibility."},"1.1 architecture"),
  Q("Win11 install fails on capable hardware. Commonly missing requirement?",["A GPU","TPM 2.0 / Secure Boot","An SSD","ECC RAM"],1,
   "Windows 11 requires TPM 2.0 and Secure Boot — the usual blockers.",
   {0:"Integrated graphics satisfy Win11.",2:"Win11 runs on HDDs too.",3:"ECC RAM is a server feature, not required."},"1.1 requirements"),
 ],
 notes:[
  "macOS uses APFS; Linux commonly uses ext4 — know these alongside Windows file systems.",
  "A Domain centralizes authentication (Active Directory); a Workgroup uses local accounts only.",
  "Windows Home can't join a traditional on-prem domain — that's a Pro feature.",
 ]},

{cert:"A+",week:2,day:2,title:"Partitions, MBR vs GPT, install types",focus:"Dividing drives and installing Windows.",obj:"1202 · 1.9 OS install",
 terms:[
  T("Partition","A logical division of a drive treated as a separate volume.","Walling one big room into sections.","Primary/extended/logical on MBR.",1),
  T("MBR (Master Boot Record)","Old scheme. Max 2TB, 4 primary partitions, legacy BIOS.","An old ledger with limited lines.","2TB + 4-partition limits.",1),
  T("GPT (GUID Partition Table) ◆CONNECTOR","Modern scheme. Huge capacity, up to 128 partitions, REQUIRED for UEFI boot.","A modern database; what new systems boot from.","UEFI boot needs GPT.",1),
  T("Volume","A formatted usable area the OS mounts (e.g., C:).","The finished labeled drawer.","Volume vs partition distinction.",1),
  T("Clean install vs upgrade ◆CONNECTOR","Clean wipes and installs fresh (best for malware/corruption); upgrade keeps files/apps.","Demolish-and-rebuild vs renovate.","Clean install removes persistent malware.",1),
  T("Repair/recovery install","Reinstalls Windows attempting to keep data, fixing system files.","A targeted fix vs full demolition.","'Reset this PC' keep-files option.",1),
  T("Boot methods","Install sources: USB, network (PXE), optical, internet recovery.","Different doors to start an install.","USB and PXE common.",1),
  T("Unattended install","Automated install via answer file — no prompts.","A script that fills the installer.","Mass deployment.",1),
  T("Format (quick vs full)","Writes a fresh file system. Quick skips the bad-sector scan; full checks sectors.","Wiping and re-lining the drawer.","Quick=fast; full=checks sectors.",1),
  T("Partition style choice ◆CONNECTOR","UEFI needs GPT; legacy BIOS-only uses MBR. Wrong pick = unbootable.","Match the partition map to the firmware.","Pairs firmware to scheme.",1),
 ],
 tasks:[
  "<span class='htag'>RECALL</span> MBR's two limits + which scheme UEFI requires.",
  "<span class='htag'>COMPARE</span> Clean install vs upgrade vs repair.",
  "<span class='htag'>SCENARIO</span> 3TB bootable drive on UEFI laptop — scheme?",
  "<span class='htag'>WRITE</span> Partition vs volume in one line.",
 ],
 quiz:[

   "MBR caps at 2TB and needs legacy BIOS; UEFI boot requires GPT, which handles 3TB.",
   {0:"MBR can't address beyond 2TB or boot under pure UEFI.",2:"FAT32 is a file system, not a partition scheme.",3:"exFAT is a file system, not a partition scheme."},"1.9 partitions"),
  Q("MBR is limited to how many primary partitions?",["1","4","128","Unlimited"],1,

  Q("A PC is badly infected. Which install type most reliably removes malware?",["In-place upgrade","Clean install","Driver update","Defrag"],1,

   {0:"An upgrade preserves files/apps — and can preserve the malware.",2:"Updating drivers doesn't remove malware.",3:"Defrag reorganizes files; it doesn't remove infections."},"1.9 install types"),
  Q("Which boot method installs an OS across the network with no local media?",["USB","PXE (network boot)","Optical","Internet recovery"],1,

   {0:"USB requires local media in each machine.",2:"Optical also requires local media.",3:"Internet recovery (macOS) pulls from Apple, not a PXE server."},"1.9 boot methods"),
  Q("Choosing MBR on a UEFI-only system results in…",["Faster boot","An unbootable installation","More partitions","Better security"],1,
   "UEFI requires GPT; selecting MBR on UEFI-only firmware produces an unbootable install.",
   {0:"It won't boot at all.",2:"MBR allows fewer partitions than GPT.",3:"MBR doesn't add security; GPT+UEFI enables Secure Boot."},"1.9 partition style"),
  Q("A quick format differs from a full format because it…",["Encrypts the drive","Skips the bad-sector scan","Creates partitions","Installs the OS"],1,
   "A quick format writes a new file system without scanning for bad sectors; full checks them.",
   {0:"Formatting isn't encryption.",2:"Partition creation is a separate step.",3:"Formatting prepares a volume; it doesn't install the OS."},"1.9 format"),
 ],
 notes:[
  "GPT stores backup partition tables, more resilient to corruption than MBR.",
  "'Reset this PC' offers keep-files or remove-everything paths — know both.",

{cert:"A+",week:2,day:3,title:"Windows command line",focus:"Core commands every tech and SOC analyst uses.",obj:"1202 · 1.2 CLI tools",
 terms:[
  T("Command line / CLI","Text interface for typed commands. Faster, scriptable.","Typing orders instead of clicking.","CompTIA tests specific commands.",1),
  T("ipconfig ◆CONNECTOR","Shows network config (IP/gateway/DNS). /release /renew for DHCP, /flushdns for DNS cache.","Asks 'what's my network address?'","Network-troubleshooting staple.",1),
  T("ping","Tests reachability to a host via ICMP echo.","Knocking to see if someone's home.","First connectivity test.",1),
  T("chkdsk ◆CONNECTOR","Checks a disk for errors. /f fixes errors, /r ALSO finds bad sectors.","A mechanic for your drive.","/f vs /r difference is tested.",1),
  T("sfc /scannow","Scans and repairs corrupted Windows system files.","A self-healing OS scan.","System-file repair.",1),
  T("gpupdate / gpresult","gpupdate refreshes Group Policy; gpresult shows applied policy.","Force-pull the rulebook / see what applied.","Domain environments.",1),
  T("tasklist / taskkill","List processes / kill one by name or PID.","See who's working / send one home.","Process management.",1),
  T("diskpart","CLI disk-partitioning tool.","Text-based drive surgeon.","Powerful — used carefully.",1),
  T("Run as administrator ◆CONNECTOR","Some commands (sfc, chkdsk /f) need an elevated prompt or they're denied.","Some orders only work with the master key.","Elevation commonly required.",1),
  T("ipconfig /flushdns","Clears the local DNS cache (fixes stale name resolution).","Wiping the phone book's scribbled notes.","DNS-cache fix.",1),
 ],
 tasks:[
  "<span class='htag'>RECALL</span> Match each command to its job.",
  "<span class='htag'>APPLY</span> Corrupted system files — which command + elevation?",
  "<span class='htag'>LAB-PREP</span> Run ipconfig and ping 8.8.8.8; read the output.",
  "<span class='htag'>WRITE</span> What does chkdsk /r add over /f?",
 ],
 quiz:[
  Q("Corrupted Windows files. Which command scans and repairs OS system files?",["ipconfig","sfc /scannow","ping","dir"],1,
   "sfc /scannow checks and repairs corrupted Windows system files specifically.",
   {0:"ipconfig shows network config, not system-file integrity.",2:"ping tests reachability.",3:"dir lists directory contents."},"1.2 CLI"),
  Q("Shows your IP and default gateway on Windows?",["chkdsk","sfc","ipconfig","tasklist"],2,
   "ipconfig displays IP, gateway, and DNS.",
   {0:"chkdsk checks disks.",1:"sfc repairs system files.",3:"tasklist lists processes."},"1.2 CLI"),
  Q("Repair file-system errors AND locate bad sectors. Which command?",["chkdsk /f","chkdsk /r","sfc /scannow","ipconfig /flushdns"],1,
   "chkdsk /r locates bad sectors and recovers readable info (and includes /f's repairs).",
   {0:"/f fixes errors but does NOT scan for bad sectors.",2:"sfc repairs system files, not disk sectors.",3:"/flushdns clears DNS cache, unrelated to sectors."},"1.2 CLI"),
  Q("sfc returns 'access denied'. Most likely fix?",["Reboot first","Run the prompt as administrator","Use FAT32","Disable the GPU"],1,
   "sfc requires an elevated (administrator) prompt; otherwise it's denied.",
   {0:"Rebooting won't grant elevation.",2:"File system is irrelevant to elevation.",3:"The GPU has nothing to do with command privileges."},"1.2 elevation"),
  Q("Clears the local DNS resolver cache?",["ipconfig /renew","ipconfig /flushdns","ping","diskpart"],1,
   "ipconfig /flushdns empties the DNS cache (fixes stale resolution).",
   {0:"/renew requests a new DHCP lease.",2:"ping tests reachability.",3:"diskpart manages partitions."},"1.2 CLI"),
  Q("Forcibly end a frozen process from the CLI?",["tasklist","taskkill","diskpart","gpupdate"],1,
   "taskkill ends a process by name or PID; tasklist only lists them.",
   {0:"tasklist shows but can't terminate.",2:"diskpart manages partitions.",3:"gpupdate refreshes Group Policy."},"1.2 CLI"),
 ],
 notes:[
  "ipconfig /release then /renew forces a fresh DHCP lease — a common connectivity fix.",
  "Many repair commands need elevation or schedule on reboot (chkdsk /f on the system drive).",
  "PowerShell supersets cmd; these commands still work but PowerShell adds far more.",
 ]},

{cert:"A+",week:2,day:4,title:"Users, permissions, UAC & security basics",focus:"Your first OS-security concepts.",obj:"1202 · 2.x security",
 terms:[
  T("User account","An identity the OS uses for access/settings. Standard or admin.","Your personal badge.","Standard vs admin.",1),
  T("Administrator","Full control: install software, change system settings.","The master-key holder.","Don't use admin daily.",1),
  T("Permissions (NTFS)","Rules for who can read/write/execute files/folders.","The guest list for each file.","NTFS vs share permissions.",1),
  T("Principle of least privilege ◆CONNECTOR","Give each account only the access it needs. Standard daily use means malware inherits limited rights.","Only the keys you actually need.","Why standard accounts are safer.",1),
  T("UAC (User Account Control)","Prompts for approval before admin-level changes.","A bouncer asking 'this app wants admin — sure?'","Blocks silent changes.",1),
  T("Authentication vs Authorization ◆CONNECTOR","AuthN = proving who you are (password). AuthZ = what you may do. AuthN before AuthZ.","Showing ID vs which doors open.","Foundational pairing.",1),
  T("MFA (Multi-Factor Authentication)","Two+ factors: know + have + are.","More than one proof to get in.","Defeats password-only attacks.",1),
  T("BitLocker ◆CONNECTOR","Windows full-disk encryption (ideally TPM-backed) — protects data AT REST on a lost/stolen drive.","Locking the whole drive in a safe.","Pro feature; data at rest.",1),
  T("Local vs Microsoft account","Local = on-device only. MS = cloud-synced.","A house key vs a key that syncs everywhere.","Know the tradeoffs.",1),
  T("Group / role","A set of permissions assigned to many users at once.","One guest list reused for a team.","Eases management.",1),
 ],
 tasks:[
  "<span class='htag'>RECALL</span> Define least privilege; why not run as admin daily?",
  "<span class='htag'>APPLY</span> Helpdesk should ONLY reset passwords — which principle?",
  "<span class='htag'>COMPARE</span> Authentication vs authorization.",
  "<span class='htag'>LAB-PREP</span> Open User Accounts; note your account type.",
 ],
 quiz:[
  Q("Why is running as a standard user day-to-day safer?",["It's faster","Malware that runs inherits fewer privileges","It uses less RAM","It disables the CPU"],1,
   "Least privilege: under a limited account, malware inherits limited rights.",
   {0:"Account type doesn't change speed.",2:"It doesn't reduce RAM.",3:"Standard accounts limit privileges, not hardware."},"2.x least privilege"),
  Q("What does UAC do?",["Encrypts the disk","Prompts before admin-level changes","Speeds up boot","Manages RAID"],1,
   "UAC asks consent before admin-level changes, blocking silent modification.",
   {0:"Disk encryption is BitLocker.",2:"No role in boot speed.",3:"RAID is storage config."},"2.x UAC"),
  Q("Helpdesk granted ONLY password resets. Which principle?",["Separation of duties","Least privilege","Implicit deny","Defense in depth"],1,
   "Granting only minimum rights for the role is least privilege.",
   {0:"Separation of duties splits a task across people.",2:"Implicit deny blocks the unlisted — related but not named here.",3:"Defense in depth is layering controls."},"2.x least privilege"),
  Q("Login asks for a password, then a phone code. This is…",["Single sign-on","Multi-factor authentication","Authorization","Encryption"],1,
   "Password (know) + phone code (have) = MFA.",
   {0:"SSO is one login for many apps.",2:"Authorization is what you can do after proving identity.",3:"Encryption protects data, not identity-proof."},"2.x MFA"),
  Q("Proving WHO you are is authentication. Deciding WHAT you access is…",["Authentication again","Authorization","Encryption","Hashing"],1,
   "Authorization governs what an authenticated identity may do.",
   {0:"That repeats the same step.",2:"Encryption protects confidentiality.",3:"Hashing verifies integrity."},"2.x AAA"),
  Q("Protects a stolen laptop's drive from being read?",["UAC","BitLocker full-disk encryption","A Wi-Fi password","Defrag"],1,
   "BitLocker encrypts the whole drive, so a thief can't read it without the key.",
   {0:"UAC only prompts during use, not on a removed drive.",2:"Wi-Fi passwords secure the network, not stored data.",3:"Defrag offers no protection."},"2.x encryption"),
 ],
 notes:[
  "NTFS permissions apply locally and over the network; share permissions only over the network — most restrictive wins.",
  "BitLocker is strongest when a TPM seals the key to the hardware.",
  "Least privilege and 'standard user by default' are the same idea for everyday accounts.",
 ]},

{cert:"A+",week:3,day:1,title:"IP addressing & the basics",focus:"How devices are addressed and found.",obj:"1201 · 2.5 IP addressing",
 terms:[
  T("IP address","Numeric label identifying a device (e.g., 192.168.1.10).","A device's street address.","IPv4 dotted-decimal.",1),
  T("MAC address","Hardware ID burned into a NIC, unique per device.","The device's permanent fingerprint.","Layer 2; IP changes, MAC doesn't.",1),
  T("Subnet mask ◆CONNECTOR","Marks which part of an IP is network vs host (255.255.255.0 = /24).","A stencil showing neighborhood vs house digits.","/24 = 254 usable hosts.",1),
  T("Default gateway ◆CONNECTOR","The router a device uses to reach destinations outside its subnet.","The neighborhood's exit door.","No gateway = no internet beyond LAN.",1),
  T("DHCP","Auto-assigns IP/mask/gateway/DNS.","The front desk handing out addresses.","Failure → APIPA.",1),
  T("DNS ◆CONNECTOR","Translates names (google.com) to IPs. Names fail but IPs work = DNS issue.","The internet's phone book.","Classic DNS symptom.",1),
  T("APIPA ◆CONNECTOR","169.254.x.x self-assigned when DHCP is unreachable.","A 'couldn't get an address' fallback.","169.254 = DHCP failure.",1),
  T("Private vs public IP","Private (10/172.16-31/192.168) internal; public internet-routable.","Inside extensions vs the public number.","NAT bridges them.",1),
  T("IPv4 vs IPv6","IPv4 = 32-bit (scarce); IPv6 = 128-bit (vast).","Short numbers vs long ones.","IPv6 solves exhaustion.",1),
  T("Static vs dynamic IP","Static = fixed manually; dynamic = DHCP-assigned.","Reserved seat vs first-come.","Servers often static.",1),
 ],

{cert:"A+",week:3,day:4,title:"Network troubleshooting tools",focus:"CLI tools to diagnose connectivity.",obj:"1201 · 5.7 tools",

  T("tracert (traceroute) ◆CONNECTOR","Shows each Layer 3 hop + latency to a destination.","Mapping every stop on the route.","Finds where delay/break is.",1),

  T("Continuous ping","ping -t runs until stopped, catching intermittent drops.","Watching the door over time.","Diagnoses intermittent loss.",1),
  T("getmac / arp","getmac shows MAC; arp maps IP↔MAC locally.","Looking up fingerprints / the local rolodex.","Layer 2 diagnostics.",1),
  T("Speed/duplex mismatch","Mismatched NIC/switch settings cause slow/erratic links.","Two people talking over each other.","Auto-negotiate usually fixes.",1),

/* ====================================================================
   STATE
==================================================================== */
const LS="soc_examgrade_v3";
function freshState(){return{startISO:null,cursor:0,completed:{},lastDoneISO:null,streak:0,tier2Unlocked:{},quizProg:{},taskProg:{},pace:"thorough",mistakes:[]};}
let S=loadState();
function loadState(){try{const x=JSON.parse(localStorage.getItem(LS));if(x)return Object.assign(freshState(),x);}catch(e){}return freshState();}
function saveState(){try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){}}
function todayISO(){return new Date().toISOString().slice(0,10);}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function isRestDay(d){return d===5||d===6;}

function reqCounts(L){
  const p=PACE[S.pace];
  return{terms:Math.min(p.terms,L.terms.length),quiz:Math.min(p.quiz,L.quiz.length)};
}
function weekAccuracy(cert,week){
  const ls=CURRICULUM.map((l,i)=>({l,i})).filter(x=>x.l.cert===cert&&x.l.week===week);
  let ok=0,total=0,allDone=true;
  ls.forEach(x=>{const c=S.completed[x.i];if(c){ok+=c.ok;total+=c.total;}else allDone=false;});
  return{ok,total,pct:total?Math.round(ok/total*100):0,allDone};
}
function overallStats(){let done=0,ok=0,total=0;Object.values(S.completed).forEach(c=>{done++;ok+=c.ok;total+=c.total;});return{done,total:CURRICULUM.length,acc:total?Math.round(ok/total*100):0};}
function missedDayPending(){
  if(!S.startISO)return false;
  const start=new Date(S.startISO+"T00:00:00"),now=new Date(todayISO()+"T00:00:00");
  let sd=0;for(let d=new Date(start);d<=now;d.setDate(d.getDate()+1)){if(!isRestDay(d.getDay()))sd++;}
  return sd>Object.keys(S.completed).length;
}

/* ====================================================================
   RENDER
==================================================================== */
const stage=document.getElementById('stage');
let mode="today";

function renderPace(){
  document.querySelectorAll('.pace-opt').forEach(b=>{
    b.classList.toggle('active',b.dataset.pace===S.pace);
    b.onclick=()=>{S.pace=b.dataset.pace;saveState();render();};
  });
  document.getElementById('paceMeta').textContent=PACE[S.pace].label;
}
function renderStatus(){
  const o=overallStats();
  document.getElementById('status').innerHTML=`
    <div class="stat"><div class="v">${o.done}/${o.total}</div><div class="l">Days done</div></div>
    <div class="stat streak"><div class="v">${S.streak}🔥</div><div class="l">Streak</div></div>
    <div class="stat"><div class="v">${o.acc}%</div><div class="l">Accuracy</div></div>
    <div class="stat tier"><div class="v">${S.mistakes?S.mistakes.length:0}</div><div class="l">To review</div></div>`;
}
document.querySelectorAll('.mode-btn').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('.mode-btn').forEach(x=>x.classList.toggle('active',x.dataset.mode===mode));render();});

function render(){renderPace();renderStatus();
  if(mode==="today")renderToday();else if(mode==="review")renderReview();else if(mode==="week")renderWeek();else if(mode==="vm")renderVM();else renderExport();}

/* -------- TODAY -------- */
function renderToday(){
  if(S.cursor>=CURRICULUM.length){
    stage.innerHTML=`<div class="done-screen"><div class="big">★ SLICE COMPLETE</div>
      <p>You finished the loaded curriculum. The engine's ready for the next batch of weeks to be added.</p></div>`;return;
  }
  const idx=S.cursor,L=CURRICULUM[idx],wkey=L.cert+"|"+L.week;
  const req=reqCounts(L);
  const tier2on=S.tier2Unlocked[wkey];
  let terms=L.terms.slice(0,req.terms);
  if(tier2on)terms=[...terms,...(TIER2[wkey]||[])];
  const quizSet=L.quiz.slice(0,req.quiz);

  let banners="";
  if(missedDayPending())
    banners+=`<div class="banner catch"><span class="ic">⚠</span><div><b>Catch-up mode.</b> A study day passed without a completed lesson. No skipping — finish this day to close the gap. Each completed day advances you one slot, so you catch up by doing the work.</div></div>`;
  if(L.title.includes("checkpoint"))
    banners+=`<div class="banner warn"><span class="ic">◆</span><div><b>Weekly checkpoint.</b> Score <b>85%+</b> across the week to unlock Tier-2 vocab for ${L.cert} Week ${L.week} — advanced terms layered on so you keep growing.</div></div>`;
  if(tier2on)
    banners+=`<div class="banner up"><span class="ic">↑</span><div><b>Tier-2 active</b> for ${L.cert} W${L.week}. Advanced terms are mixed in below (<span style="color:var(--purple)">NEW TIER</span>).</div></div>`;
  banners+=`<div class="banner info"><span class="ic">▣</span><div><b>${S.pace.toUpperCase()} pace:</b> ${req.terms} terms + ${quizSet.length} exam questions required today. Switch pace up top anytime — FASTER trims to essentials, THOROUGH loads everything.</div></div>`;

  stage.innerHTML=banners+`
    <div class="lesson-head">
      <span class="pill cert">${L.cert}</span>
      <span class="pill wk">W${L.week} · D${L.day}</span>
      <span class="pill obj">${L.obj}</span>
      ${tier2on?'<span class="pill tierp">TIER 2</span>':''}
    </div>
    <div class="lesson-title">${L.title}</div>
    <div class="lesson-focus">${L.focus}</div>
    <div class="est">⏱ est. ${PACE[S.pace].estLo}–${PACE[S.pace].estHi} min at ${S.pace} pace</div>

    <div class="sec-label">VOCABULARY &amp; TERMS <span class="sec-count">${terms.length} terms</span></div>
    <div id="terms">${terms.map(tm=>{
      const conn=tm.t.includes("◆CONNECTOR");
      const nm=tm.t.replace("◆CONNECTOR","").trim();
      return `<div class="term">
        <div class="t">${nm} ${conn?'<span class="new" style="background:#0d1f15;color:var(--green);border-color:#1d4427">◆ CONNECTOR</span>':''} ${tm.t2?'<span class="new">NEW TIER</span>':''}</div>
        <div class="d">${tm.d}</div>
        <div class="eli5"><b>LIKE YOU'RE NEW ▸</b> ${tm.e}</div>
        ${tm.exam?`<div class="exam">▸ EXAM: ${tm.exam}</div>`:''}
      </div>`;}).join('')}
    </div>

    <div class="sec-label">PRACTICE TASKS <span class="sec-count">${L.tasks.length} tasks</span></div>
    <div id="tasks">${L.tasks.map((tk,i)=>`
      <div class="task" data-ti="${i}"><div class="cb" data-ti="${i}"></div><div class="tx">${tk}</div></div>`).join('')}
    </div>

    <div class="sec-label">KNOWLEDGE CHECK <span class="sec-count">${quizSet.length} questions</span></div>
    <div id="quizarea"></div>`;

  const taskState=new Array(L.tasks.length).fill(false);
  stage.querySelectorAll('.cb').forEach(cb=>cb.onclick=()=>{
    const i=+cb.dataset.ti;taskState[i]=!taskState[i];
    cb.classList.toggle('checked',taskState[i]);cb.closest('.task').classList.toggle('checked',taskState[i]);
    enableFinish();
  });

  function renderQuizArea(){
    const area=document.getElementById('quizarea');
    const qp=S.quizProg[idx]||{i:0,ok:0};
    if(qp.i>=quizSet.length){
      const pct=Math.round(qp.ok/Math.max(quizSet.length,1)*100);
      area.innerHTML=`<div class="scorebar"><span>Quiz complete:</span><span class="ok">✓ ${qp.ok}</span><span class="no">✗ ${quizSet.length-qp.ok}</span><span>· ${pct}%</span></div>
        <div class="mini">Finish your practice tasks above, then complete the day.</div>
        <button class="btn primary" id="finishBtn" disabled>Finish tasks + quiz to advance</button>`;
      wireFinish();enableFinish();return;
    }
    const it=quizSet[qp.i];
    area.innerHTML=`
      <div class="scorebar"><span>Q ${qp.i+1}/${quizSet.length}</span><span class="ok">✓ ${qp.ok}</span></div>
      <div class="q-obj">▸ ${it.obj}</div>
      <div class="quiz-stem">${it.s}</div>
      <div id="opts">${it.o.map((o,i)=>`<button class="opt" data-i="${i}"><span class="ltr">${String.fromCharCode(65+i)}</span>${o}</button>`).join('')}</div>
      <div class="explain" id="expwrong" style="border-left-color:var(--red);display:none"></div>
      <div class="explain" id="exp"><b>Why ${String.fromCharCode(65+it.a)} is correct:</b> ${it.e}</div>
      <button class="btn ghost" id="nextq" style="display:none">next question →</button>`;
    let answered=false;
    area.querySelectorAll('.opt').forEach(btn=>btn.onclick=()=>{
      if(answered)return;answered=true;
      const pick=+btn.dataset.i;
      area.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(+b.dataset.i===it.a)b.classList.add('correct');});
      if(pick===it.a)qp.ok++;else{btn.classList.add('wrong');
        // show why THIS pick was wrong
        const ww=(it.w&&it.w[pick])?it.w[pick]:"That option doesn't fit — re-read the correct answer's explanation below.";
        const ew=document.getElementById('expwrong');
        ew.innerHTML=`<b style="color:var(--red)">Why ${String.fromCharCode(65+pick)} is wrong:</b> ${ww}`;
        ew.style.display='block';
        // record mistake for review (dedupe by stem), now WITH wrongWhy
        if(!S.mistakes.some(m=>m.s===it.s)){S.mistakes.push({s:it.s,o:it.o,a:it.a,e:it.e,w:it.w||{},obj:it.obj,cert:L.cert,day:L.day,week:L.week});}
      }
      document.getElementById('exp').classList.add('show');
      document.getElementById('nextq').style.display='block';
      S.quizProg[idx]=qp;saveState();
    });
    document.getElementById('nextq').onclick=()=>{qp.i++;S.quizProg[idx]=qp;saveState();renderQuizArea();};
  }
  function enableFinish(){
    const btn=document.getElementById('finishBtn');if(!btn)return;
    const allTasks=taskState.every(Boolean);
    const qp=S.quizProg[idx]||{i:0};const quizDone=qp.i>=quizSet.length;
    btn.disabled=!(allTasks&&quizDone);
    btn.textContent=allTasks&&quizDone?`✓ Complete Day ${L.day} & advance`:`Finish tasks + quiz to advance`;
  }
  function wireFinish(){
    const btn=document.getElementById('finishBtn');if(!btn)return;
    btn.onclick=()=>{
      const qp=S.quizProg[idx]||{i:0,ok:0};const today=todayISO();
      if(!S.startISO)S.startISO=today;
      S.completed[idx]={ok:qp.ok,total:quizSet.length,doneISO:today};
      if(S.lastDoneISO){const gap=daysBetween(S.lastDoneISO,today);S.streak=(gap===0)?S.streak:S.streak+1;}else S.streak=1;
      S.lastDoneISO=today;
      if(L.title.includes("checkpoint")){const wa=weekAccuracy(L.cert,L.week);if(wa.pct>=85&&TIER2[wkey])S.tier2Unlocked[wkey]=true;}
      S.cursor=idx+1;delete S.quizProg[idx];saveState();flashResult();
    };
  }
  function flashResult(){
    if(L.title.includes("checkpoint")){
      const wa=weekAccuracy(L.cert,L.week);const unlocked=wa.pct>=85&&TIER2[wkey];
      stage.innerHTML=`<div class="done-screen"><div class="big">${wa.pct}%</div>
        <p>${L.cert} Week ${L.week} checkpoint complete.</p>
        ${unlocked?`<div class="banner up" style="margin-top:16px;text-align:left"><span class="ic">↑</span><div><b>Tier-2 unlocked!</b> You cleared 85%. Advanced ${L.cert} terms now join your rotation — leveling up, not repeating.</div></div>`
        :wa.pct>=85?`<p style="margin-top:8px;color:var(--green)">Cleared 85% — strong week.</p>`
        :`<div class="banner warn" style="margin-top:16px;text-align:left"><span class="ic">◆</span><div>Under 85% (${wa.pct}%). No Tier-2 yet — revisit this week in the WEEK tab before pushing on. Mastery over speed.</div></div>`}
        <button class="btn primary" id="contBtn">continue →</button></div>`;
    }else{
      stage.innerHTML=`<div class="done-screen"><div class="big">✓ Day done</div>
        <p>${L.cert} W${L.week}D${L.day} logged · streak ${S.streak}🔥</p>
        <button class="btn primary" id="contBtn">next day →</button></div>`;
    }
    document.getElementById('contBtn').onclick=()=>render();
  }
  renderQuizArea();
}

/* -------- WEEK -------- */
function renderWeek(){
  const L=CURRICULUM[Math.min(S.cursor,CURRICULUM.length-1)];
  const weekLessons=CURRICULUM.map((l,i)=>({l,i})).filter(x=>x.l.cert===L.cert&&x.l.week===L.week);
  const wa=weekAccuracy(L.cert,L.week);
  let rail=`<div class="weekrail">`;
  weekLessons.forEach((x,k)=>{
    const done=S.completed[x.i],isCur=x.i===S.cursor;
    let cls="daychip";if(done)cls+=" done";else if(x.i<S.cursor)cls+=" missed";if(isCur)cls+=" active";
    rail+=`<div class="${cls}" data-jump="${x.i}"><div class="dow">${DOW[k]}</div><div class="dn">D${x.l.day}</div><div class="wl">${x.l.cert}</div></div>`;
  });
  rail+=`<div class="daychip rest"><div class="dow">FRI</div><div class="dn">OFF</div><div class="wl">rest</div></div>
         <div class="daychip rest"><div class="dow">SAT</div><div class="dn">OFF</div><div class="wl">catch-up</div></div></div>`;
  stage.innerHTML=`
    <div class="lesson-head"><span class="pill cert">${L.cert}</span><span class="pill wk">WEEK ${L.week}</span></div>
    <div class="lesson-focus" style="margin-top:8px">Week runs <b>Sun–Thu</b> (study) with <b>Fri/Sat off</b> for rest &amp; catch-up — matched to your schedule. Tap a past day to revisit it.</div>
    ${rail}
    <div class="banner ${wa.pct>=85?'ok':'warn'}"><span class="ic">${wa.pct>=85?'✓':'◆'}</span><div>Week accuracy: <b>${wa.pct}%</b> (${wa.ok}/${wa.total}). ${wa.pct>=85?'Tier-2 territory — keep it up.':'Reach 85% by checkpoint day to unlock Tier-2 vocab.'}</div></div>
    <div class="sec-label">DAYS THIS WEEK</div>
    ${weekLessons.map(x=>{const c=S.completed[x.i];
      const tag=c?`<span style="color:var(--green);font-family:var(--mono);font-size:11px">✓ ${Math.round(c.ok/c.total*100)}%</span>`
        :x.i===S.cursor?`<span style="color:var(--amber);font-family:var(--mono);font-size:11px">▸ current</span>`
        :`<span style="color:var(--muted);font-family:var(--mono);font-size:11px">locked</span>`;
      return `<div class="term" ${x.i<=S.cursor?`style="cursor:pointer" data-jump="${x.i}"`:''}>
        <div class="t">Day ${x.l.day}: ${x.l.title} ${tag}</div>
        <div class="d">${x.l.focus}</div><div class="exam" style="margin-top:5px;color:#c9a55a;font-family:var(--mono);font-size:11px">${x.l.obj}</div></div>`;
    }).join('')}`;
  stage.querySelectorAll('[data-jump]').forEach(el=>el.onclick=()=>{const j=+el.dataset.jump;if(j<=S.cursor){S.cursor=j;delete S.quizProg[j];if(S.completed[j])delete S.completed[j];saveState();mode="today";document.querySelectorAll('.mode-btn').forEach(x=>x.classList.toggle('active',x.dataset.mode==='today'));render();}});
}
