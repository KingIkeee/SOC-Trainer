/* -------- REVIEW (mistakes re-drill) -------- */
function renderReview(){
  if(!S.mistakes.length){
    stage.innerHTML=`<div class="vm-lock"><div class="lk">🎯</div><div class="mono">No mistakes logged yet.</div>
      <p style="margin-top:10px;font-size:13px;color:var(--muted)">When you miss a question in TODAY, it lands here so you can re-drill it. Repetition on your weak spots is how this sticks.</p></div>`;
    return;
  }
  // a review session: re-ask each missed question; correct twice in a row removes it
  const rp=window.__reviewPos||0;
  const list=S.mistakes;
  if(rp>=list.length){
    window.__reviewPos=0;
    stage.innerHTML=`<div class="done-screen"><div class="big">↻ Round done</div>
      <p>You re-drilled all ${list.length} missed question${list.length>1?'s':''}. ${list.length} still in rotation.</p>
      <button class="btn primary" id="again">drill again →</button>
      <button class="btn ghost" id="clearOne">remove ones I now know</button></div>`;
    document.getElementById('again').onclick=()=>{window.__reviewPos=0;renderReview();};
    document.getElementById('clearOne').onclick=()=>{
      // remove any marked mastered
      S.mistakes=S.mistakes.filter(m=>!m._mastered);saveState();window.__reviewPos=0;renderReview();
    };
    return;
  }
  const it=list[rp];
  stage.innerHTML=`
    <div class="banner info"><span class="ic">🎯</span><div><b>Review mode.</b> Re-drilling your missed questions (${rp+1} of ${list.length}). Get it right and mark it mastered to clear it out.</div></div>
    <div class="lesson-head"><span class="pill cert">${it.cert}</span><span class="pill wk">W${it.week} · D${it.day}</span><span class="pill obj">${it.obj}</span></div>
    <div class="q-obj" style="margin-top:10px">▸ ${it.obj}</div>
    <div class="quiz-stem">${it.s}</div>
    <div id="opts">${it.o.map((o,i)=>`<button class="opt" data-i="${i}"><span class="ltr">${String.fromCharCode(65+i)}</span>${o}</button>`).join('')}</div>
    <div class="explain" id="expwrong" style="border-left-color:var(--red);display:none"></div>
    <div class="explain" id="exp"><b>Why ${String.fromCharCode(65+it.a)} is correct:</b> ${it.e}</div>
    <div id="revnav" style="display:none;margin-top:14px">
      <button class="btn primary" id="masterBtn">✓ Got it — mark mastered &amp; next</button>
      <button class="btn ghost" id="keepBtn">keep in rotation → next</button>
    </div>`;
  let answered=false;
  stage.querySelectorAll('.opt').forEach(btn=>btn.onclick=()=>{
    if(answered)return;answered=true;
    const pick=+btn.dataset.i;
    stage.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(+b.dataset.i===it.a)b.classList.add('correct');});
    if(pick!==it.a){btn.classList.add('wrong');
      const ww=(it.w&&it.w[pick])?it.w[pick]:"That option doesn't fit — re-read the correct answer's explanation below.";
      const ew=document.getElementById('expwrong');
      ew.innerHTML=`<b style="color:var(--red)">Why ${String.fromCharCode(65+pick)} is wrong:</b> ${ww}`;
      ew.style.display='block';
    }
    document.getElementById('exp').classList.add('show');
    document.getElementById('revnav').style.display='block';
    const correct=pick===it.a;
    document.getElementById('masterBtn').onclick=()=>{it._mastered=true;S.mistakes=S.mistakes.filter(m=>m.s!==it.s);saveState();renderReview();};
    document.getElementById('keepBtn').onclick=()=>{window.__reviewPos=rp+1;renderReview();};
  });
}

/* Build a Word-compatible HTML doc and download as .docx (opens cleanly in Word & Google Docs) */
function generateDocx(completedLessons){
  const st=document.getElementById('genStatus');st.textContent="building document…";
  const L=["A","B","C","D"];
  let body=`
    <h1 style="color:#1a2332;font-size:28pt;text-align:center;margin-top:120pt">SOC PATH</h1>

    <p style="text-align:center;color:#555;font-size:10pt;font-style:italic">Terms · connector concepts · every question with answers &amp; explanations. This document grows as you complete each day.</p>
    <br style="page-break-after:always"/>
    <h1 style="color:#1a2332">How to use this guide</h1>
    <p>Each day below has its vocabulary, the full knowledge-check questions with the correct answer marked and explained, and extra noteworthy facts. Terms marked ◆ CONNECTOR teach how the pieces relate, so every question is answerable from what you studied. Re-read completed sections often — repetition is the method, not wasted time.</p>
    <br/>`;

  if(!completedLessons.length){
    body+=`<p style="color:#a00"><b>No completed days yet.</b> Finish at least Day 1 in the TODAY tab, then export to capture it here.</p>`;
  }

  let curWeekKey="";
  completedLessons.forEach(({l,i})=>{
    const wkey=l.cert+" — Week "+l.week;
    if(wkey!==curWeekKey){curWeekKey=wkey;
      body+=`<br style="page-break-before:always"/><h1 style="color:#1a2332">${esc(l.cert)} — Week ${l.week}</h1>`;
    }
    body+=`<h2 style="color:#b87600">Day ${l.day}: ${esc(l.title)}</h2>`;
    body+=`<p style="color:#2E75B6;font-style:italic;font-size:10pt">Objective focus: ${esc(l.obj)}</p>`;
    // terms (respect pace count used)
    const req=reqCounts(l);
    let terms=l.terms.slice(0,req.terms);
    if(S.tier2Unlocked[l.cert+"|"+l.week])terms=[...terms,...(TIER2[l.cert+"|"+l.week]||[])];
    body+=`<h3 style="color:#1a2332">Vocabulary &amp; Terms</h3>`;
    terms.forEach(tm=>{
      const conn=tm.t.includes("◆CONNECTOR")||tm.t.includes("CONNECTOR");
      const name=tm.t.replace("◆CONNECTOR","").trim();
      body+=`<table width="100%" cellpadding="6" style="border:1px solid #ccc;border-collapse:collapse;background:${conn?'#eaf3ea':'#f2f6fa'}">
        <tr><td style="border:1px solid #ccc"><b style="color:#1a2332">${esc(name)}</b>${conn?' <span style="color:#2d6a3e;font-size:9pt"><b>◆ CONNECTOR</b></span>':''}</td></tr>
        <tr><td style="border:1px solid #ccc;background:#fff"><b style="color:#555">Definition:</b> ${esc(tm.d)}<br/><b style="color:#2E75B6">Like you're new:</b> <i>${esc(tm.e)}</i>${tm.exam?`<br/><span style="color:#b87600;font-size:9pt">EXAM: ${esc(tm.exam)}</span>`:''}</td></tr>
      </table><br/>`;
    });
    // quiz
    const quizSet=l.quiz.slice(0,req.quiz);
    body+=`<h3 style="color:#1a2332">Knowledge Check — Questions, Answers &amp; Explanations</h3>`;
    quizSet.forEach((q,qi)=>{
      body+=`<p style="margin-bottom:2pt"><b style="color:#b87600">Q${qi+1}.</b> <b>${esc(q.s)}</b></p>`;
      q.o.forEach((opt,oi)=>{const c=oi===q.a;
        body+=`<p style="margin:0 0 0 24pt;color:${c?'#2d6a3e':'#000'}"><b>${L[oi]}.</b> ${c?'<b>':''}${esc(opt)}${c?' ✓</b>':''}</p>`;});
      body+=`<p style="margin:2pt 0 2pt 24pt;border-left:3px solid #2d6a3e;padding-left:8pt"><b style="color:#2d6a3e">Why ${L[q.a]} is correct:</b> <i>${esc(q.e)}</i></p>`;
      if(q.w&&Object.keys(q.w).length){
        Object.keys(q.w).forEach(k=>{ body+=`<p style="margin:0 0 0 24pt;border-left:3px solid #c0392b;padding-left:8pt;color:#555;font-size:10pt"><b style="color:#c0392b">Why ${L[+k]} is wrong:</b> ${esc(q.w[k])}</p>`; });

  // mistakes appendix

    S.mistakes.forEach((q,qi)=>{
      body+=`<p style="margin-bottom:2pt"><b style="color:#f85149">Missed ${qi+1}.</b> <b>${esc(q.s)}</b> <span style="color:#555;font-size:9pt">(${esc(q.cert)} W${q.week}D${q.day})</span></p>`;
      q.o.forEach((opt,oi)=>{const c=oi===q.a;
        body+=`<p style="margin:0 0 0 24pt;color:${c?'#2d6a3e':'#000'}"><b>${L[oi]}.</b> ${c?'<b>':''}${esc(opt)}${c?' ✓</b>':''}</p>`;});
      body+=`<p style="margin:2pt 0 2pt 24pt;border-left:3px solid #2d6a3e;padding-left:8pt"><b style="color:#2d6a3e">Why ${L[q.a]} is correct:</b> <i>${esc(q.e)}</i></p>`;
      if(q.w&&Object.keys(q.w).length){
        Object.keys(q.w).forEach(k=>{ body+=`<p style="margin:0 0 0 24pt;border-left:3px solid #c0392b;padding-left:8pt;color:#555;font-size:10pt"><b style="color:#c0392b">Why ${L[+k]} is wrong:</b> ${esc(q.w[k])}</p>`; });

  }

  // progress log

    <table width="100%" cellpadding="6" style="border:1px solid #ccc;border-collapse:collapse">
    <tr style="background:#1a2332;color:#fff"><td><b>Date</b></td><td><b>Cert / Week / Day</b></td><td><b>Score %</b></td><td><b>Notes</b></td></tr>`;
  completedLessons.forEach(({l,i})=>{const c=S.completed[i];
    body+=`<tr><td>${c.doneISO||''}</td><td>${esc(l.cert)} W${l.week} D${l.day}</td><td>${Math.round(c.ok/c.total*100)}%</td><td></td></tr>`;});
  body+=`</table>`;

  const html=`<!DOCTYPE html><html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
    <head><meta charset='utf-8'><title>SOC Path Study Guide</title>
    <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]-->
    <style>body{font-family:Arial,sans-serif;font-size:11pt;color:#000} h1{font-size:18pt} h2{font-size:14pt} h3{font-size:12pt} table{margin:4pt 0}</style>
    </head><body>${body}</body></html>`;

  try{
    const blob=new Blob(['\ufeff'+html],{type:'application/msword'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const stamp=new Date().toISOString().slice(0,10);
    a.href=url;a.download=`SOC_Path_Study_Guide_${stamp}.doc`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    st.innerHTML=`<span style="color:var(--green)">✓ Downloaded. Opens in Word & Google Docs. Now save it to your Drive folder.</span>`;
  }catch(e){st.innerHTML=`<span style="color:var(--red)">Export failed: ${e.message}</span>`;}
}


function renderHow(){
  stage.innerHTML=`
    <div class="sec-label">HOW THIS TRAINER WORKS</div>
    <div class="term"><div class="t">🎚️ Pace you control</div><div class="d">THOROUGH loads every term + question (~50–75 min/day). BALANCED trims to the core 8+8. FASTER hits essentials only (6+6) to compress the timeline. Switch anytime up top — your call, week to week.</div></div>
    <div class="term"><div class="t">📅 One exam-mapped day at a time</div><div class="d">Each day targets specific CompTIA objectives (shown as a green pill). Order is A+ → Network+ → Security+. Week = Sun–Thu study, Fri/Sat off.</div></div>
    <div class="term"><div class="t">✅ Real work to advance</div><div class="d">A day counts only when you finish the hands-on practice tasks AND the knowledge check. No passive reading — the advance button stays locked until both are done.</div></div>
    <div class="term"><div class="t">⚠ No skipping</div><div class="d">If a study day passes uncompleted, Catch-up mode appears. You close the gap by finishing lessons, never by jumping ahead.</div></div>
    <div class="term"><div class="t">↑ 85% unlocks Tier-2</div><div class="d">Each week's checkpoint scores you. 85%+ layers advanced vocab into that cert — always growing.</div></div>
    <div class="term"><div class="t">🧒 Beginner-built, exam-grade</div><div class="d">Every term has a plain-English explanation AND an exam note tying it to what CompTIA actually tests. Nothing you learn is wasted.</div></div>
    <div class="term"><div class="t">🖥️ Labs after Day 4</div><div class="d">Step-by-step VirtualBox → VM → pfSense → Wireshark → SIEM. The SOC job in miniature.</div></div>
    <div class="mini">Timeline at your settings: ~8–9 months thorough · ~5–6 months faster. Progress saves on this device.</div>`;
}

document.getElementById('resetBtn').onclick=()=>{if(confirm('Reset everything — days, streak, unlocks, pace?')){localStorage.removeItem(LS);S=freshState();mode="today";document.querySelectorAll('.mode-btn').forEach(x=>x.classList.toggle('active',x.dataset.mode==='today'));render();}};

/* -------- BACKUP: export / import progress -------- */
function flashHint(msg,color){const h=document.getElementById('backupHint');if(!h)return;const prev=h.textContent;h.textContent=msg;if(color)h.style.color=color;setTimeout(()=>{h.textContent=prev;h.style.color='';},4000);}

document.getElementById('exportBackupBtn').onclick=()=>{
  try{
    const payload={app:"soc-daily-trainer",fmt:1,savedISO:new Date().toISOString(),state:S};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download="soc-progress-"+todayISO()+".json";
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    flashHint("✓ Backup downloaded. Move it to your other device, then tap 'restore progress' there.","var(--green)");
  }catch(e){flashHint("Couldn't create the backup file on this browser.","var(--red)");}
};

document.getElementById('importBackupBtn').onclick=()=>document.getElementById('importFile').click();

document.getElementById('importFile').onchange=(ev)=>{
  const file=ev.target.files&&ev.target.files[0];
  ev.target.value=""; // allow re-importing same file later
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const obj=JSON.parse(reader.result);
      const incoming=(obj&&obj.state)?obj.state:obj; // accept wrapped or raw
      if(!incoming||typeof incoming!=='object'||!('completed'in incoming)||!('pace'in incoming)){
        flashHint("That file doesn't look like a SOC trainer backup.","var(--red)");return;
      }
      const when=obj.savedISO?(" from "+obj.savedISO.slice(0,10)):"";
      if(!confirm("Restore progress"+when+"? This replaces the current progress on THIS device.")){flashHint("Restore cancelled — nothing changed.");return;}
      S=Object.assign(freshState(),incoming);
      saveState();
      mode="today";
      document.querySelectorAll('.mode-btn').forEach(x=>x.classList.toggle('active',x.dataset.mode==='today'));
      render();
      flashHint("✓ Progress restored on this device.","var(--green)");
    }catch(e){flashHint("Couldn't read that file — is it the .json backup?","var(--red)");}
  };
  reader.onerror=()=>flashHint("Couldn't open that file.","var(--red)");
  reader.readAsText(file);
};

render();
</script>

</html>
